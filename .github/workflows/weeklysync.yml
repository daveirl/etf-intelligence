name: ETF Intelligence — Weekly Sync

on:
  schedule:
    - cron: '0 7 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pdfplumber

      - name: Run CBI UCITS fund sync
        run: python scripts/cbi_shadow_sync_v2.py

      - name: Run CBI AIF sync
        run: python scripts/cbi_aif_sync.py

      - name: Run CBI ICAV sync
        run: python scripts/icav_sync.py

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name  "etf-intelligence-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/cbi_shadow_db.csv data/aif_db.csv data/icav_db.csv docs/index.html
          git diff --staged --quiet && exit 0
          git commit -m "chore: weekly sync $(date +'%Y-%m-%d')"
          # Rebase onto whatever has landed on main while the sync ran,
          # then retry the push a few times in case of further races.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1
